name: test 
on: 
   push: 
      branches:
         - main   
         - "realese/**"
      paths:
         - "src/**"
   pull_request:
      branches:
         - main
         - "realese/**"
jobs: 
   test:
      runs-on: ubuntu-latest 
      steps: 
         - name: checkout code 
           uses: actions/checkout@v6.0.2
         - name: run test 
           run: npm test

